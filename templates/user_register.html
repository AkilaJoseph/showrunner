{% extends "base.html" %}
{% block title %}Create Account — ShowRunner{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">♦</div>
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-sub">Register to book tickets faster</p>

        <form method="POST">
            <div class="field">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" placeholder="e.g. John Doe" required autofocus>
            </div>
            <div class="form-row">
                <div class="field">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="field">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="+255 7XX XXX XXX">
                </div>
            </div>
            <div class="field">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password"
                       placeholder="At least 6 characters" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">
                Create Account
            </button>
        </form>

        <p class="auth-footer">
            Already have an account?
            <a href="{{ url_for('user_login') }}" style="color:var(--accent-gold)">Log in</a>
        </p>
        <p class="auth-footer" style="margin-top:6px">
            Want to organise events?
            <a href="{{ url_for('org_register') }}" style="color:var(--text-secondary)">Register as organizer</a>
        </p>
    </div>
</div>
{% endblock %}
