{% extends "base.html" %}
{% block title %}Add Venue — ShowRunner{% endblock %}
{% block content %}
<a href="{{ url_for('org_venues_list') }}" class="btn-back">← Back to Venues</a>
<h2 class="page-title">Add Venue</h2>
<p class="page-subtitle">After saving you can upload photos of the venue.</p>

<form method="POST" class="form-card">
    <div class="field">
        <label for="name">Venue Name *</label>
        <input type="text" id="name" name="name" placeholder="e.g. Downtown Comedy Club" required autofocus>
    </div>
    <div class="field">
        <label for="location">Location *</label>
        <input type="text" id="location" name="location" placeholder="e.g. Masaki, Dar es Salaam" required>
    </div>
    <div class="form-row">
        <div class="field">
            <label for="rows">Number of Rows *</label>
            <input type="number" id="rows" name="rows" placeholder="e.g. 6"
                   min="1" max="26" required oninput="updateCapacity()">
        </div>
        <div class="field">
            <label for="seats_per_row">Seats per Row *</label>
            <input type="number" id="seats_per_row" name="seats_per_row" placeholder="e.g. 10"
                   min="1" max="30" required oninput="updateCapacity()">
        </div>
    </div>
    <p class="form-hint" id="capacity-hint" style="min-height:20px"></p>
    <button type="submit" class="btn btn-primary btn-full">Save Venue & Add Photos →</button>
</form>
{% endblock %}

{% block scripts %}
<script>
function updateCapacity() {
    const rows = parseInt(document.getElementById("rows").value) || 0;
    const spr  = parseInt(document.getElementById("seats_per_row").value) || 0;
    const hint = document.getElementById("capacity-hint");
    hint.textContent = (rows && spr) ? `Total capacity: ${rows * spr} seats` : "";
}
</script>
{% endblock %}
